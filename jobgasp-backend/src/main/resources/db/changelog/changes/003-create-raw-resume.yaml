databaseChangeLog:
  - changeSet:
      id: 003-create-raw-resume
      author: prabhat
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: raw_resume
      changes:
        - createTable:
            tableName: raw_resume
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: true
              - column:
                  name: file_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: source_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: raw_text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: uploaded_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createIndex:
            indexName: idx_raw_resume_status
            tableName: raw_resume
            columns:
              - column:
                  name: status

        - createIndex:
            indexName: idx_raw_resume_uploaded_at
            tableName: raw_resume
            columns:
              - column:
                  name: uploaded_at
