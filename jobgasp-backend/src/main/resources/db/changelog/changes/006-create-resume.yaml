databaseChangeLog:
  - changeSet:
      id: 006-create-resume
      author: prabhat
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: resume
      changes:
        - createTable:
            tableName: resume
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_resume_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: file_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: file_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: file_size_bytes
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: storage_path
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: UPLOADED
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

        - createIndex:
            indexName: idx_resume_user_id
            tableName: resume
            columns:
              - column:
                  name: user_id

        - createIndex:
            indexName: idx_resume_status
            tableName: resume
            columns:
              - column:
                  name: status
