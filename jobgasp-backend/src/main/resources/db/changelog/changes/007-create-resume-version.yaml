databaseChangeLog:
  - changeSet:
      id: 007-create-resume-version
      author: prabhat
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: resume_version
      changes:
        - createTable:
            tableName: resume_version
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: resume_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_resume_version_resume
                    references: resume(id)
                    deleteCascade: true
              - column:
                  name: version_number
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: label
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: raw_text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: word_count
                  type: INT
                  constraints:
                    nullable: true
              - column:
                  name: char_count
                  type: INT
                  constraints:
                    nullable: true
              - column:
                  name: extraction_status
                  type: VARCHAR(50)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: now()
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: resume_version
            columnNames: resume_id, version_number
            constraintName: uq_resume_version_resume_id_version_number

        - createIndex:
            indexName: idx_resume_version_resume_id
            tableName: resume_version
            columns:
              - column:
                  name: resume_id
