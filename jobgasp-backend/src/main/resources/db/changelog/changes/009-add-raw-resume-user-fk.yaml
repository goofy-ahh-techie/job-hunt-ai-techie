databaseChangeLog:
  - changeSet:
      id: 009-add-raw-resume-user-fk
      author: prabhat
      # raw_resume already exists (changeset 003), so the guard here checks the
      # constraint — not the table. MARK_RAN keeps a re-run safe if the FK is
      # already present (e.g. applied out of band on an existing dev DB).
      preConditions:
        onFail: MARK_RAN
        not:
          foreignKeyConstraintExists:
            foreignKeyName: fk_raw_resume_user
      changes:
        # Legacy raw_resume rows (from the Phase 1 raw-intake stub) carry random
        # user_id values that reference no real user. Null those orphans first so
        # the FK can be added; SET NULL is the same semantics the constraint uses
        # on delete, and user_id is nullable.
        - sql:
            sql: >-
              UPDATE raw_resume SET user_id = NULL
              WHERE user_id IS NOT NULL
                AND user_id NOT IN (SELECT id FROM users)

        - addForeignKeyConstraint:
            constraintName: fk_raw_resume_user
            baseTableName: raw_resume
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL
