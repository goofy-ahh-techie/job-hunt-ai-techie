databaseChangeLog:
  - changeSet:
      id: 004-create-raw-jd
      author: prabhat
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: raw_jd
      changes:
        - createTable:
            tableName: raw_jd
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: true
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: company_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: source_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: raw_text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createIndex:
            indexName: idx_raw_jd_status
            tableName: raw_jd
            columns:
              - column:
                  name: status

        - createIndex:
            indexName: idx_raw_jd_created_at
            tableName: raw_jd
            columns:
              - column:
                  name: created_at
