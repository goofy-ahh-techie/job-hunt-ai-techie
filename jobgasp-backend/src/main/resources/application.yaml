server:
  port: 8080

spring:
  application:
    name: job-hunt-copilot-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jobhunt}
    username: ${DB_USERNAME:jobhunt}
    password: ${DB_PASSWORD:jobhunt}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          # Persist timestamps in UTC regardless of the host's timezone.
          # The JDBC *connection* timezone is a separate concern handled in
          # JobHuntBackendApplication.applyDefaultTimeZone() — it is negotiated
          # at handshake, before any property here is applied.
          time_zone: UTC
    open-in-view: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    jwt:
      # Override in every non-local environment. HS256 needs >= 32 bytes.
      secret: ${JWT_SECRET:local-dev-only-secret-change-me-0123456789}
      issuer: ${JWT_ISSUER:job-hunt-copilot}
      access-token-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:3600}

  intelligence:
    base-url: ${INTELLIGENCE_BASE_URL:http://localhost:8000}
    connect-timeout-ms: 3000
    read-timeout-ms: 5000

logging:
  level:
    root: INFO
    com.jobhunt.copilot: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always