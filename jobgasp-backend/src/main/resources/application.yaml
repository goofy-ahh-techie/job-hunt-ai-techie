server:
  port: 8080

spring:
  application:
    name: job-hunt-copilot-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jobhunt}
    username: ${DB_USERNAME:jobhunt}
    password: ${DB_PASSWORD:jobhunt}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  intelligence:
    base-url: ${INTELLIGENCE_BASE_URL:http://localhost:8000}
    connect-timeout-ms: 3000
    read-timeout-ms: 5000

logging:
  level:
    root: INFO
    com.jobhunt.copilot: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always